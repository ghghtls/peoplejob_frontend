name: Frontend CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Analyze & Test (Flutter)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Create .env stub
        run: |
          cat > .env << 'EOF'
          API_URL=http://localhost:5000
          FIREBASE_API_KEY=ci-dummy-key
          FIREBASE_AUTH_DOMAIN=ci-project.firebaseapp.com
          FIREBASE_PROJECT_ID=ci-project
          FIREBASE_STORAGE_BUCKET=ci-project.appspot.com
          FIREBASE_MESSAGING_SENDER_ID=000000000000
          FIREBASE_APP_ID=1:000000000000:web:000000000000
          EOF

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze --no-fatal-infos

      - name: Run unit & widget tests
        run: |
          flutter test \
            test/widget_tests/ \
            test/auth_service_test.dart \
            test/board_service_test.dart \
            test/resume_service_test.dart \
            test/apply_service_test.dart \
            test/notice_service_test.dart
